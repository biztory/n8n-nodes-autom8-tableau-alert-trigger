# Publishes @biztory/n8n-nodes-autom8-tableau-alert-trigger to npm whenever a
# tag of the form `tableau-alert-trigger/X.Y.Z` is pushed.
#
# See publish-tableau-action-trigger.yml for the rationale, OIDC setup, and
# release process — the steps are identical other than the package directory
# and tag namespace.

name: Publish tableau-alert-trigger

on:
  push:
    tags:
      - 'tableau-alert-trigger/*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        # Publishes to npm with a provenance attestation (requires id-token: write).
        # Lint and build run automatically as part of `n8n-node release`.
        #
        # OIDC: leave NPM_TOKEN unset — the auth step below is a no-op and npm
        # uses the OIDC exchange.
        # Token: set NPM_TOKEN in repo secrets — written to .npmrc here.
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
