# Publishes @biztory/n8n-nodes-autom8-tableau-alert-trigger to npm whenever a
# tag of the form `tableau-alert-trigger/X.Y.Z` is pushed.
#
# See publish-tableau-action-trigger.yml for the rationale, OIDC setup, and
# release process — the steps are identical other than the package directory
# and tag namespace.

name: Publish tableau-alert-trigger

on:
  push:
    tags:
      - 'tableau-alert-trigger/*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Release
        # Publishes to npm with a provenance attestation (requires id-token: write).
        # Lint and build run automatically as part of `n8n-node release`.
        #
        # setup-node (above) writes .npmrc: //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
        # Token: set NPM_TOKEN in repo secrets → NODE_AUTH_TOKEN is used for auth.
        # OIDC: leave NPM_TOKEN unset → npm uses the OIDC exchange with the Trusted Publisher.
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
